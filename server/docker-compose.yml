services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/usr/share/caddy/html:ro
      - caddy_data:/data
    restart: unless-stopped

  media-server:
    image: tiangolo/nginx-rtmp:latest
    ports:
      - "1935:1935"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/usr/share/nginx/html:ro
      - hls_data:/tmp/hls
    restart: unless-stopped

  api:
    image: python:3.11-alpine
    ports:
      - "8081:8081"
    command: python /app/server.py
    volumes:
      - ./server.py:/app/server.py:ro
    restart: unless-stopped

  # VNC 隧道中转 — CI macOS runner 通过此服务暴露远程桌面
  bore-server:
    image: alpine:3.19
    command: sh -c "
      wget -qO - https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp &&
      chmod +x /tmp/bore &&
      /tmp/bore server --min-port 20000 --max-port 20100
      "
    ports:
      - "7835:7835"
      - "20000-20100:20000-20100"
    restart: unless-stopped

volumes:
  hls_data:
  caddy_data:
