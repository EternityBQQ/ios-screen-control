name: ScreenCapture
options:
  bundleIdPrefix: com.screencapture
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ScreenCapture:
    type: application
    platform: iOS
    sources:
      - path: .
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.screencapture.app
        CODE_SIGN_ENTITLEMENTS: ScreenCapture.entitlements

  ScreenCaptureUpload:
    type: app-extension
    platform: iOS
    sources:
      - path: ../ScreenCaptureUpload
    settings:
      base:
        INFOPLIST_FILE: ../ScreenCaptureUpload/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.screencapture.app.upload
        CODE_SIGN_ENTITLEMENTS: ../ScreenCaptureUpload/ScreenCaptureUpload.entitlements
