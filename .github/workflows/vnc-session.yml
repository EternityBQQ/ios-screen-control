name: VNC 远程桌面

on:
  workflow_dispatch:

jobs:
  vnc:
    name: 🖥️ macOS 远程桌面
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: 开启 VNC 屏幕共享
        run: |
          VNC_PASS="iosdev123"

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate -stop 2>/dev/null || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "$VNC_PASS" \
            -restart -agent 2>&1

          sleep 3
          lsof -i :5900 | head -3
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"
          echo "✅ VNC 已开启"

      - name: 唤醒显示器 + 打开 Xcode
        run: |
          caffeinate -d -i -m -s &
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | head -1)
          [ -n "$XCODE" ] && open "$XCODE" && echo "✅ 已打开 $XCODE"
          sleep 5

      - name: 安装 ngrok
        run: |
          curl -fsSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-darwin-amd64.zip -o /tmp/ngrok.zip
          unzip -o /tmp/ngrok.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/ngrok
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          echo "✅ ngrok 已就绪"

      - name: 启动 ngrok 隧道 + 输出连接信息
        timeout-minutes: 55
        run: |
          VNC_PASS="iosdev123"

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║     🖥️  macOS 远程桌面                         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║                                              ║"
          echo "║  📲 iPhone 操作:                              ║"
          echo "║  1. App Store → 下载 'VNC Viewer'            ║"
          echo "║  2. 地址: 填下方显示的 ngrok 地址              ║"
          echo "║  3. 密码: iosdev123                          ║"
          echo "║                                              ║"
          echo "║  🖥️  连上后:                                  ║"
          echo "║  1. Dock 点 Xcode 图标                       ║"
          echo "║  2. Settings → Accounts → + 登录 Apple ID    ║"
          echo "║  3. 然后新建任意项目 → Team 选 Personal Team  ║"
          echo "║  4. 证书自动创建 → 到此完成                    ║"
          echo "║                                              ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          # 启动 ngrok TCP 隧道
          ngrok tcp 5900 --log=stdout 2>&1 | while IFS= read -r line; do
            echo "$line"
            # 捕获 ngrok 分配的地址
            if echo "$line" | grep -q "started tunnel"; then
              echo ""
            fi
            if echo "$line" | grep -q "url="; then
              ADDR=$(echo "$line" | grep -oE 'tcp://[^[:space:]]+' | sed 's|tcp://||')
              if [ -n "$ADDR" ]; then
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "  ✅ 隧道已建立!                              "
                echo "  📲 VNC 地址: $ADDR                      "
                echo "  🔑 密码:     $VNC_PASS                      "
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo ""
              fi
            fi
          done