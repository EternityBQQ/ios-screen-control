name: VNC 远程桌面

on:
  workflow_dispatch:

jobs:
  vnc:
    name: 🖥️ macOS 远程桌面
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: 开启 VNC 屏幕共享
        run: |
          VNC_PASS="iosdev123"

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate -stop 2>/dev/null || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "$VNC_PASS" \
            -restart -agent 2>&1

          sleep 3
          lsof -i :5900 | head -3
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"
          echo "✅ VNC 已开启"

      - name: 唤醒显示器 + 打开 Xcode
        run: |
          caffeinate -d -i -m -s &
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | head -1)
          [ -n "$XCODE" ] && open "$XCODE" && echo "✅ 已打开 $XCODE"
          sleep 5

      - name: 安装 bore 客户端
        run: |
          curl -fsSL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-apple-darwin.tar.gz -o /tmp/bore.tar.gz
          tar xzf /tmp/bore.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/bore
          echo "✅ bore 已安装"

      - name: 启动隧道 → 用自己的服务器中转
        timeout-minutes: 55
        run: |
          VNC_PASS="iosdev123"
          BORE_SERVER="www.reelmagic.cloud"

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║     🖥️  macOS 远程桌面                         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  📲 iPhone 操作:                              ║"
          echo "║  1. App Store → 下载 'VNC Viewer'            ║"
          echo "║  2. 地址: 下方显示                            ║"
          echo "║  3. 密码: iosdev123                          ║"
          echo "║                                              ║"
          echo "║  🖥️  连上后:                                  ║"
          echo "║  1. Dock 点 Xcode 图标                       ║"
          echo "║  2. Settings → Accounts → + 登录 Apple ID    ║"
          echo "║  3. File → New → Project → iOS App           ║"
          echo "║  4. Team 选 Personal Team → 证书自动创建     ║"
          echo "║  5. 然后跑 curl 脚本导出证书                  ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  中转服务器: $BORE_SERVER"
          echo ""

          bore local 5900 --to "$BORE_SERVER" 2>&1 | while IFS= read -r line; do
            echo "$line"
            if echo "$line" | grep -q "listening at"; then
              ADDR=$(echo "$line" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+')
              if [ -n "$ADDR" ]; then
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "  ✅ 隧道已建立!"
                echo "  📲 VNC 地址: $ADDR"
                echo "  🔑 密码:     $VNC_PASS"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo ""
              fi
            fi
          done