name: VNC 远程桌面

on:
  workflow_dispatch:

jobs:
  vnc:
    name: 🖥️ macOS 远程桌面
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: 准备桌面环境 (防黑屏)
        run: |
          # 禁用屏保和锁屏
          sudo defaults write /Library/Preferences/com.apple.screensaver askForPassword -bool false
          sudo defaults write /Library/Preferences/com.apple.screensaver askForPasswordDelay -int 0

          # 禁用显示器休眠
          sudo pmset -a displaysleep 0 sleep 0
          caffeinate -d -i -m -s -u &

          # 确保 WindowServer 活跃
          sudo launchctl load /System/Library/LaunchDaemons/com.apple.WindowServer.plist 2>/dev/null || true

          echo "✅ 桌面环境已准备"

      - name: 开启 VNC 屏幕共享
        run: |
          VNC_PASS="iosdev123"

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate -stop 2>/dev/null || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "$VNC_PASS" \
            -restart -agent 2>&1

          sleep 3
          lsof -i :5900 | head -3
          echo "VNC_PASS=$VNC_PASS" >> "$GITHUB_ENV"
          echo "✅ VNC 已开启"

      - name: 打开 Xcode 和 Finder
        run: |
          # 用当前用户身份启动 GUI
          UID=$(id -u)
          sudo launchctl asuser $UID open /System/Library/CoreServices/Finder.app 2>/dev/null || true
          sleep 3

          # 打开 Xcode
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | head -1)
          [ -n "$XCODE" ] && sudo launchctl asuser $UID open "$XCODE" 2>/dev/null || true
          [ -n "$XCODE" ] && open "$XCODE" && echo "✅ 已打开 $XCODE"
          sleep 5

          # 强制重启 VNC（让它在桌面渲染后重新捕获画面）
          VNC_PASS="iosdev123"
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent 2>&1
          sleep 3

          # 截图用于调试
          screencapture /tmp/debug-desktop.png
          echo "✅ 桌面截图已保存"

      - name: 上传桌面截图 (调试用)
        uses: actions/upload-artifact@v4
        with:
          name: debug-desktop
          path: /tmp/debug-desktop.png
          retention-days: 1
        continue-on-error: true

      - name: 安装 bore 客户端
        run: |
          curl -fsSL https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-apple-darwin.tar.gz -o /tmp/bore.tar.gz
          tar xzf /tmp/bore.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/bore
          echo "✅ bore 已安装"

      - name: 启动 bore 隧道
        timeout-minutes: 50
        run: |
          VNC_PASS="iosdev123"
          BORE_SERVER="www.reelmagic.cloud"

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║     🖥️  macOS 远程桌面                         ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  📲 VNC Viewer 连接:                         ║"
          echo "║  地址: www.reelmagic.cloud                    ║"
          echo "║  端口: 等下方日志显示                          ║"
          echo "║  密码: iosdev123                             ║"
          echo "║                                              ║"
          echo "║  ⚠️ 连接后如果是黑屏: 等 10 秒会显示桌面       ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          # 先输出服务器地址
          echo "  📡 连接服务器: $BORE_SERVER:7835"

          # 手动解析 bore 输出
          bore local 5900 --to "$BORE_SERVER" 2>&1 | while IFS= read -r line; do
            echo "  $line"

            # 匹配 "connected to server"
            if echo "$line" | grep -qi "connected"; then
              RPORT=$(echo "$line" | grep -oE 'remote_port=[0-9]+' | cut -d= -f2)
              if [ -n "$RPORT" ]; then
                echo ""
                echo "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "  ✅ 隧道已建立!"
                echo "  📲 VNC 地址: www.reelmagic.cloud:$RPORT"
                echo "  🔑 密码:     $VNC_PASS"
                echo "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo ""
              fi
            fi

            # 匹配 "listening at"
            if echo "$line" | grep -qi "listening"; then
              LPORT=$(echo "$line" | grep -oE ':[0-9]+' | tail -1 | tr -d ':')
              if [ -n "$LPORT" ]; then
                echo ""
                echo "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "  ✅ 隧道已建立!"
                echo "  📲 VNC 地址: www.reelmagic.cloud:$LPORT"
                echo "  🔑 密码:     $VNC_PASS"
                echo "  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo ""
              fi
            fi
          done