name: Build iOS Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建模式'
        required: true
        type: choice
        default: 'build-check'
        options:
          - build-check      # 编译检查 (零配置，每次 push 自动跑)
          - generate-csr     # 生成 CSR (浏览器上传到 Apple 创建证书)
          - manual-sign      # 签名导出 IPA (需证书 Secrets)

env:
  DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer

jobs:
  # ════════════════════════════════════════════════════════════
  # 编译检查 — 零配置，push/PR 自动运行
  # ════════════════════════════════════════════════════════════
  build-check:
    name: 🔍 编译检查
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_type == 'build-check'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build ScreenCapture
        working-directory: ScreenCapture
        run: |
          xcodegen generate
          xcodebuild build \
            -project ScreenCapture.xcodeproj \
            -scheme ScreenCapture \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20

      - name: Build ScreenViewer
        working-directory: ScreenViewer
        run: |
          xcodegen generate
          xcodebuild build \
            -project ScreenViewer.xcodeproj \
            -scheme ScreenViewer \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -20

  # ════════════════════════════════════════════════════════════
  # 生成 CSR — CI 生成密钥对+CSR，下载后浏览器上传 Apple
  # ════════════════════════════════════════════════════════════
  generate-csr:
    name: 🔑 生成 CSR
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_type == 'generate-csr'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Generate Key + CSR
        run: |
          mkdir -p certs
          openssl genrsa -out certs/ci-signing.key 2048
          openssl req -new -key certs/ci-signing.key \
            -out certs/ci-signing.csr \
            -subj "/emailAddress=your@email.com/CN=CI Build/C=US"
          echo ""
          echo "-----BEGIN CERTIFICATE REQUEST-----"
          cat certs/ci-signing.csr
          echo "-----END CERTIFICATE REQUEST-----"
          echo ""

      - name: Upload CSR
        uses: actions/upload-artifact@v4
        with:
          name: signing-csr
          path: certs/ci-signing.csr
          retention-days: 7

      - name: Upload Private Key (protected)
        uses: actions/upload-artifact@v4
        with:
          name: signing-key-protected
          path: certs/ci-signing.key
          retention-days: 1

      - name: 下一步说明
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  ✅ CSR 已生成，下一步:                       ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  1. 下载 Artifact: signing-csr.zip"
          echo "  2. 浏览器打开: https://developer.apple.com/account"
          echo "     → Certificates → + → 上传 ci-signing.csr"
          echo "     → 下载 .cer 文件"
          echo "  3. 同一页面创建 App ID 和 Provisioning Profile"
          echo "  4. 填入 GitHub Secrets:"
          echo "     APPLE_TEAM_ID / BUILD_CERTIFICATE_BASE64"
          echo "     / CERTIFICATE_KEY_BASE64 / PROVISIONING_PROFILE_BASE64"
          echo "  5. Actions → Run workflow → manual-sign → 出 IPA"
          echo ""

  # ════════════════════════════════════════════════════════════
  # 手动签名 — 用证书和 Profile 签名导出 IPA
  # ════════════════════════════════════════════════════════════
  manual-sign:
    name: 🔐 签名导出 IPA
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.build_type == 'manual-sign'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: 检查 Secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.APPLE_TEAM_ID }}" ] && MISSING="$MISSING APPLE_TEAM_ID"
          [ -z "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ] && MISSING="$MISSING BUILD_CERTIFICATE_BASE64"
          [ -z "${{ secrets.CERTIFICATE_KEY_BASE64 }}" ] && MISSING="$MISSING CERTIFICATE_KEY_BASE64"
          [ -z "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" ] && MISSING="$MISSING PROVISIONING_PROFILE_BASE64"
          if [ -n "$MISSING" ]; then
            echo "❌ 缺少 Secrets: $MISSING"
            echo "  先运行 generate-csr，然后去 developer.apple.com 创建证书"
            exit 1
          fi
          echo "✅ 所有签名 Secrets 已配置"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: 合成 P12 证书
        run: |
          mkdir -p certs
          echo "${{ secrets.CERTIFICATE_KEY_BASE64 }}" | base64 --decode > certs/private.key
          echo "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > certs/certificate.cer
          P12_PASS=$(openssl rand -base64 24)
          echo "P12_PASSWORD=${P12_PASS}" >> "$GITHUB_ENV"

          openssl pkcs12 -export \
            -inkey certs/private.key \
            -in certs/certificate.cer \
            -out certs/signing.p12 \
            -passout "pass:${P12_PASS}"
          echo "✅ P12 已合成"

      - name: 配置 Keychain
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KPASS=$(openssl rand -base64 32)

          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"

          security import certs/signing.p12 \
            -k "$KEYCHAIN" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["]//g')
          security default-keychain -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPASS" "$KEYCHAIN"
          echo "✅ Keychain 就绪"

      - name: 安装 Provisioning Profile
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o "$PROFILE_PATH"

          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
            /usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin 2>/dev/null || \
            grep -aA1 "UUID" "$PROFILE_PATH" | grep string | sed 's/.*<string>//;s/<\/string>.*//')

          cp "$PROFILE_PATH" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
          echo "PROFILE_UUID=${PROFILE_UUID}" >> "$GITHUB_ENV"
          echo "✅ Profile: $PROFILE_UUID"

      - name: Archive + Export IPA
        working-directory: ScreenCapture
        run: |
          xcodegen generate

          CERT_ID=$(security find-identity -v -p codesigning | \
            grep -oE '"Apple (Development|Distribution)[^"]*"' | head -1 | tr -d '"' || \
            echo "Apple Development")
          echo "  证书: $CERT_ID"

          xcodebuild archive \
            -project ScreenCapture.xcodeproj \
            -scheme ScreenCapture \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/ScreenCapture.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$CERT_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            2>&1 | tail -20

          # 导出
          METHOD=$(echo "$CERT_ID" | grep -q "Distribution" && echo "ad-hoc" || echo "development")

          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>${METHOD}</string>
              <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>compileBitcode</key><false/>
              <key>stripSwiftSymbols</key><true/>
              <key>signingStyle</key><string>manual</string>
              <key>signingCertificate</key><string>${CERT_ID}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.screencapture.app</key><string>${PROFILE_UUID}</string>
                  <key>com.screencapture.app.upload</key><string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/ScreenCapture.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ./build/ipa \
            2>&1 | tail -20

          ls -lh ./build/ipa/*.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScreenCapture.ipa
          path: ScreenCapture/build/ipa/*.ipa
          retention-days: 90

      - name: 完成
        run: |
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║  ✅ IPA 已生成                        ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  📥 下载: Artifacts → ScreenCapture.ipa ║"
          echo "║  📲 传到服务器 → OTA 安装到 iPhone   ║"
          echo "╚══════════════════════════════════════╝"
          echo ""
